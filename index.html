<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vortex AI</title>
    
    <!-- Tailwind CSS for styling -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Phosphor Icons for UI elements -->
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    
    <!-- Marked.js for parsing Markdown from the AI response -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    
    <!-- Highlight.js for code block syntax highlighting (Dark theme) -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/atom-one-dark.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>

    <!-- Tesseract.js for Image-to-Text OCR -->
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
    
    <!-- EmailJS SDK -->
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>

    <style>
        /* Mobile Overscroll Fix */
        body { overscroll-behavior-y: none; }
        
        /* Custom scrollbar for the dark theme */
        .custom-scrollbar::-webkit-scrollbar { width: 6px; height: 6px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background-color: rgba(16, 185, 129, 0.5); border-radius: 20px; }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover { background-color: rgba(16, 185, 129, 0.8); }
        
        /* Google Style Color Palette for Name */
        .google-name {
            background: linear-gradient(90deg, #4285F4 0%, #DB4437 33%, #F4B400 66%, #0F9D58 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            font-weight: 800;
        }

        /* Ambient Background Orbs */
        @keyframes move-orb1 {
            0% { transform: translate(0, 0) scale(1); }
            50% { transform: translate(3vw, 8vh) scale(1.05); }
            100% { transform: translate(0, 0) scale(1); }
        }
        @keyframes move-orb2 {
            0% { transform: translate(0, 0) scale(1); }
            50% { transform: translate(-3vw, -8vh) scale(1.08); }
            100% { transform: translate(0, 0) scale(1); }
        }
        .orb-1 { animation: move-orb1 18s ease-in-out infinite; }
        .orb-2 { animation: move-orb2 22s ease-in-out infinite; }

        /* Vortex Edge Lighting (Emerald/Teal) */
        @keyframes rainbow-border {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }
        .vortex-border-wrap {
            background: linear-gradient(90deg, #10b981, #06b6d4, #3b82f6, #10b981);
            background-size: 200% 200%;
            animation: rainbow-border 4s linear infinite;
            padding: 2px;
            border-radius: 1.5rem;
            transition: all 0.4s ease;
        }
        
        /* Static Border during chat */
        .border-static {
            animation: none !important;
            background: rgba(255, 255, 255, 0.15) !important;
        }

        /* Liquid Glass Elements */
        .glass-panel {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.05);
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.1);
        }
        
        .glass-panel-strong {
            background: rgba(18, 18, 26, 0.6);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
        }

        /* Highly Blurred Liquid Glass for Chat Title & Top Nav */
        .liquid-glass-title {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3), inset 0 0 0 1px rgba(255, 255, 255, 0.05);
        }

        /* Neo-Brutalist + Glassmorphism Styles (Emerald Theme) */
        .neo-glass {
            background: rgba(18, 18, 26, 0.85);
            backdrop-filter: blur(32px);
            -webkit-backdrop-filter: blur(32px);
            border: 2px solid rgba(16, 185, 129, 0.4);
            box-shadow: 8px 8px 0px rgba(16, 185, 129, 0.2);
        }
        
        .neo-glass-btn {
            background: rgba(16, 185, 129, 0.15);
            border: 2px solid #10b981;
            box-shadow: 4px 4px 0px rgba(16, 185, 129, 0.5);
            transition: all 0.2s cubic-bezier(0.2, 1.3, 0.7, 1);
        }
        .neo-glass-btn:hover {
            transform: translate(-2px, -2px);
            box-shadow: 6px 6px 0px rgba(16, 185, 129, 0.7);
            background: rgba(16, 185, 129, 0.25);
        }
        .neo-glass-btn:active {
            transform: translate(2px, 2px);
            box-shadow: 2px 2px 0px rgba(16, 185, 129, 1);
        }
        
        .neo-glass-btn-red {
            background: rgba(239, 68, 68, 0.1);
            border: 2px solid #ef4444;
            box-shadow: 4px 4px 0px rgba(239, 68, 68, 0.4);
            transition: all 0.2s ease;
        }
        .neo-glass-btn-red:hover {
            transform: translate(-2px, -2px);
            box-shadow: 6px 6px 0px rgba(239, 68, 68, 0.6);
        }

        /* Custom Audio Player Styling */
        audio { height: 36px; border-radius: 8px; outline: none; }
        audio::-webkit-media-controls-panel { background: rgba(16, 185, 129, 0.1); }
        audio::-webkit-media-controls-play-button { background-color: rgba(16,185,129,0.8); border-radius: 50%; }
        audio::-webkit-media-controls-current-time-display,
        audio::-webkit-media-controls-time-remaining-display { color: #fff; }

        /* Flying Text Animation */
        @keyframes fly-in-text {
            0% { opacity: 0; transform: translateY(15px) scale(0.98) rotateX(-10deg); }
            100% { opacity: 1; transform: translateY(0) scale(1) rotateX(0deg); }
        }
        .streaming.markdown-body * {
            animation: fly-in-text 0.5s cubic-bezier(0.2, 1.3, 0.7, 1) forwards;
        }

        /* Liquid Glass Input Backdrop */
        .liquid-backdrop {
            position: absolute;
            inset: -40px 0 0 0;
            background: rgba(0, 0, 0, 0.3);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            mask-image: linear-gradient(to bottom, transparent, black 40px);
            -webkit-mask-image: linear-gradient(to bottom, transparent, black 40px);
            z-index: -1;
        }

        /* Bouncing Animation */
        .bounce-dot { animation: custom-bounce 1.4s infinite ease-in-out both; }
        .bounce-dot:nth-child(1) { animation-delay: -0.32s; }
        .bounce-dot:nth-child(2) { animation-delay: -0.16s; }
        
        @keyframes custom-bounce {
            0%, 80%, 100% { transform: scale(0); opacity: 0.3; }
            40% { transform: scale(1); opacity: 1; }
        }

        /* Animations */
        .fade-out {
            opacity: 0;
            transform: translateY(-20px) scale(0.95);
            transition: all 0.6s cubic-bezier(0.4, 0, 0.2, 1);
        }
        
        .message-enter { animation: slideUpFade 0.4s ease-out forwards; }

        @keyframes slideUpFade {
            from { opacity: 0; transform: translateY(15px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Block Cube Form Styles (Login Screen) */
        .form { width: 100%; max-width: 320px; margin: 0 auto; }
        .form .control { margin: 0 0 24px; position: relative; }
        .form .control input, .form .control .block-cube__btn {
            width: 100%; padding: 14px 16px; border: 0; background: transparent;
            color: #fff; font-size: 16px; position: relative; z-index: 2;
        }
        .form .control input:focus, .form .control .block-cube__btn:focus { outline: none; }
        .form .control .block-cube__btn { cursor: pointer; font-weight: 600; letter-spacing: 1px; text-transform: uppercase; }
        .form .control .bg-top {
            position: absolute; height: 10px; background: linear-gradient(90deg, #059669 0%, #14b8a6 100%);
            bottom: 100%; left: 5px; right: -5px; transform: skew(-45deg, 0); margin: 0; z-index: 1;
        }
        .form .control .bg-top .bg-inner { bottom: 0; }
        .form .control .bg {
            position: absolute; left: 0; top: 0; right: 0; bottom: 0;
            background: linear-gradient(90deg, #059669 0%, #14b8a6 100%); z-index: 1;
        }
        .form .control .bg-right {
            position: absolute; background: #14b8a6; top: -5px; z-index: 0; bottom: 5px;
            width: 10px; left: 100%; transform: skew(0, -45deg);
        }
        .form .control .bg-right .bg-inner { left: 0; }
        .form .control .bg .bg-inner { transition: all 0.2s ease-in-out; }
        .form .control .bg-inner { background: #12121a; position: absolute; left: 2px; top: 2px; right: 2px; bottom: 2px; }
        .form .control.block-cube-hover:hover .bg .bg-inner { background: rgba(16, 185, 129, 0.2); }
        .form .control.block-input input::placeholder { color: rgba(255,255,255,0.4); }

        /* Custom Checkbox */
        .custom-checkbox {
            appearance: none; background-color: transparent; margin: 0;
            font: inherit; color: currentColor; width: 1.15em; height: 1.15em;
            border: 1px solid rgba(255,255,255,0.3); border-radius: 0.15em;
            display: grid; place-content: center; cursor: pointer;
        }
        .custom-checkbox::before {
            content: ""; width: 0.65em; height: 0.65em;
            transform: scale(0); transition: 120ms transform ease-in-out;
            box-shadow: inset 1em 1em #10b981;
            transform-origin: center;
            clip-path: polygon(14% 44%, 0 65%, 50% 100%, 100% 16%, 80% 0%, 43% 62%);
        }
        .custom-checkbox:checked::before { transform: scale(1); }

        /* --- Colourful Popup Hamburger Menu --- */
        .circular-menu {
            position: fixed; top: 20px; left: 20px; z-index: 40;
            width: 56px; height: 56px; list-style: none; pointer-events: auto;
        }
        .circular-menu-item, .circular-menu-button {
            display: grid; place-items: center; width: 56px; height: 56px;
            border-radius: 50%; color: white; transition: transform 0.5s cubic-bezier(0.2, 1.3, 0.7, 1);
            position: absolute; top: 0; left: 0;
        }
        
        /* Animated Nav Button Gradient */
        @keyframes nav-gradient-anim {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }
        .circular-menu-button {
            background: linear-gradient(135deg, #10b981, #06b6d4, #3b82f6, #8b5cf6, #10b981);
            background-size: 300% 300%;
            animation: nav-gradient-anim 6s ease infinite;
            cursor: pointer; transition: all 0.4s; box-shadow: 0 4px 15px rgba(16, 185, 129, 0.3); z-index: 10;
        }
        .circular-menu-button:hover { transform: scale(1.05); filter: brightness(1.1); }
        
        .glass-gray-nav {
            animation: none !important;
            background: rgba(255, 255, 255, 0.08) !important;
            backdrop-filter: blur(12px) !important; -webkit-backdrop-filter: blur(12px) !important;
            border: 1px solid rgba(255, 255, 255, 0.1) !important; box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1) !important;
        }

        .hamburger-lines { position: absolute; width: 22px; height: 3px; background: white; border-radius: 2px; transition: transform 0.3s, opacity 0.2s; }
        .line-1 { transform: translateY(-7px); }
        .line-3 { transform: translateY(7px); }
        .menu-open { display: none; }
        
        .menu-open:checked ~ .circular-menu-button .line-1 { transform: rotate(45deg); }
        .menu-open:checked ~ .circular-menu-button .line-2 { opacity: 0; }
        .menu-open:checked ~ .circular-menu-button .line-3 { transform: rotate(-45deg); }
        
        .circular-menu-item {
            opacity: 0; transform: scale(0);
            transition: transform 0.4s cubic-bezier(0.2, 1.3, 0.7, 1), opacity 0.2s;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.3); border: 1px solid rgba(255, 255, 255, 0.1);
        }
        .menu-open:checked ~ .circular-menu-item { opacity: 1; transform: scale(1); }
        .menu-open:checked ~ .circular-menu-item:nth-child(3) { transition-delay: 0.05s; transform: translate(75px, 0); }
        .menu-open:checked ~ .circular-menu-item:nth-child(4) { transition-delay: 0.1s; transform: translate(55px, 55px); }
        .menu-open:checked ~ .circular-menu-item:nth-child(5) { transition-delay: 0.15s; transform: translate(0, 75px); }
        .circular-menu-item:hover { transform: scale(1.1) !important; }
        
        /* Jiggle Bounce Animation */
        @keyframes jiggle-bounce {
            0%, 100% { transform: translateY(0) scale(1) rotate(0deg); }
            25% { transform: translateY(-3px) scale(1.05) rotate(5deg); }
            50% { transform: translateY(2px) scale(0.98) rotate(-4deg); }
            75% { transform: translateY(-2px) scale(1.02) rotate(2deg); }
        }
        .menu-open:checked ~ .circular-menu-item .jiggle-inner { animation: jiggle-bounce 2.5s infinite ease-in-out; }
        .menu-open:checked ~ .circular-menu-item:nth-child(3) .jiggle-inner { animation-delay: 0s; }
        .menu-open:checked ~ .circular-menu-item:nth-child(4) .jiggle-inner { animation-delay: 0.2s; }
        .menu-open:checked ~ .circular-menu-item:nth-child(5) .jiggle-inner { animation-delay: 0.4s; }

        .item-home { background: linear-gradient(135deg, #3b82f6, #2dd4bf); }
        .item-history { background: linear-gradient(135deg, #ec4899, #f43f5e); }
        .item-settings { background: linear-gradient(135deg, #10b981, #06b6d4); }

        /* Custom Settings Range Slider */
        input[type=range] { -webkit-appearance: none; width: 100%; background: transparent; }
        input[type=range]::-webkit-slider-thumb {
            -webkit-appearance: none; height: 16px; width: 16px; border-radius: 50%;
            background: #10b981; cursor: pointer; margin-top: -6px; box-shadow: 0 0 10px rgba(16,185,129,0.5);
        }
        input[type=range]::-webkit-slider-runnable-track {
            width: 100%; height: 4px; cursor: pointer; background: rgba(255,255,255,0.1); border-radius: 2px;
        }
        input[type=range]:focus { outline: none; }

        /* Dark Theme Markdown Styles - Upgraded for Canvas/Spreadsheets */
        .markdown-body { color: #e2e8f0; }
        .markdown-body p { margin-bottom: 0.75rem; }
        .markdown-body p:last-child { margin-bottom: 0; }
        .markdown-body code { background-color: rgba(255,255,255,0.1); padding: 0.125rem 0.25rem; border-radius: 0.25rem; font-family: monospace; font-size: 0.875em; color: #e2e8f0; }
        .markdown-body pre { background-color: #1e1e1e; color: #fff; padding: 1rem; border-radius: 0.5rem; overflow-x: auto; margin-bottom: 1rem; border: 1px solid rgba(255,255,255,0.05); }
        .markdown-body pre code { background-color: transparent; padding: 0; color: inherit; }
        .markdown-body ul { list-style-type: disc; padding-left: 1.5rem; margin-bottom: 0.75rem; }
        .markdown-body ol { list-style-type: decimal; padding-left: 1.5rem; margin-bottom: 0.75rem; }
        .markdown-body a { color: #06b6d4; text-decoration: underline; }
        .markdown-body h1, .markdown-body h2, .markdown-body h3 { font-weight: bold; margin-top: 1rem; margin-bottom: 0.5rem; color: #fff; }
        .markdown-body h1 { font-size: 1.5em; }
        .markdown-body h2 { font-size: 1.25em; }
        /* Markdown Tables / Canvases */
        .markdown-body table { width: 100%; overflow-x: auto; display: block; border-collapse: collapse; margin-bottom: 1rem; border-radius: 0.5rem; }
        .markdown-body th, .markdown-body td { border: 1px solid rgba(16,185,129,0.2); padding: 8px 12px; }
        .markdown-body th { background-color: rgba(16,185,129,0.1); font-weight: bold; }
        .markdown-body tr:nth-child(even) { background-color: rgba(255,255,255,0.02); }
    </style>
</head>
<body class="bg-black bg-[radial-gradient(ellipse_at_bottom,_var(--tw-gradient-stops))] from-[#064e3b]/80 via-[#0a0a0a] to-[#0a0a0a] h-screen flex flex-col font-sans text-white overflow-hidden relative">

    <!-- Ambient Subtle Orbs Background -->
    <div class="fixed inset-0 overflow-hidden pointer-events-none z-[0]">
        <div class="absolute top-[10%] left-[10%] w-[40vw] h-[40vw] rounded-full bg-emerald-900/10 blur-[100px] orb-1"></div>
        <div class="absolute bottom-[20%] right-[10%] w-[30vw] h-[30vw] rounded-full bg-cyan-900/10 blur-[120px] orb-2"></div>
    </div>

    <!-- Auth Screen (Login/Register) -->
    <div id="authScreen" class="fixed inset-0 z-50 bg-[#0a0a0a] flex flex-col items-center justify-center transition-opacity duration-700">
        <form class="form" id="authForm" autocomplete="off">
            <div class="control">
                <h1 id="authTitle" class="text-3xl font-bold mb-8 tracking-widest text-center text-white uppercase">Sign In</h1>
            </div>
            
            <div id="authError" class="hidden mb-6 p-3 rounded-xl bg-red-500/20 border border-red-500/50 text-red-400 text-sm text-center"></div>
            <div id="authSuccess" class="hidden mb-6 p-3 rounded-xl bg-green-500/20 border border-green-500/50 text-green-400 text-sm text-center"></div>

            <div class="control block-cube block-input">
                <input name="username" id="authUsername" type="text" placeholder="Username" required autocomplete="off" />
                <div class="bg-top"><div class="bg-inner"></div></div>
                <div class="bg-right"><div class="bg-inner"></div></div>
                <div class="bg"><div class="bg-inner"></div></div>
            </div>

            <div class="control block-cube block-input">
                <input name="password" id="authPassword" type="password" placeholder="Password" required />
                <div class="bg-top"><div class="bg-inner"></div></div>
                <div class="bg-right"><div class="bg-inner"></div></div>
                <div class="bg"><div class="bg-inner"></div></div>
            </div>

            <div class="flex items-center gap-3 mb-8 mt-2 justify-center">
                <input type="checkbox" id="authRemember" checked class="custom-checkbox">
                <label for="authRemember" class="text-sm text-gray-400 cursor-pointer select-none tracking-wide">Remember Me</label>
            </div>

            <div class="control block-cube block-cube-hover">
                <button class="block-cube__btn submit" type="submit" id="authSubmitBtn">Sign In</button>
                <div class="bg-top"><div class="bg-inner"></div></div>
                <div class="bg-right"><div class="bg-inner"></div></div>
                <div class="bg"><div class="bg-inner"></div></div>
            </div>

            <div class="control block-cube block-cube-hover mt-6">
                <button class="block-cube__btn register text-sm !text-gray-400 hover:!text-white transition-colors" type="button" id="authToggleBtn" onclick="toggleAuthMode()">Register</button>
                <div class="bg-top"><div class="bg-inner"></div></div>
                <div class="bg-right"><div class="bg-inner"></div></div>
                <div class="bg"><div class="bg-inner"></div></div>
            </div>
        </form>
    </div>

    <!-- Main App Interface -->
    <div id="mainApp" class="absolute inset-0 flex flex-col opacity-0 transition-opacity duration-1000 ease-in-out pointer-events-none">
        
        <!-- App Mode Switcher (Visible only on Home Screen) -->
        <div id="modeSwitcher" class="absolute top-6 left-1/2 transform -translate-x-1/2 z-40 liquid-glass-title rounded-full flex p-1 transition-opacity duration-500 pointer-events-auto">
            <button onclick="setAppMode('text')" id="modeTextBtn" class="px-5 py-1.5 rounded-full text-sm font-bold transition-all bg-emerald-500/20 text-emerald-400">Text</button>
            <button onclick="setAppMode('vision')" id="modeVisionBtn" class="px-5 py-1.5 rounded-full text-sm font-bold transition-all text-gray-400 hover:text-white">Vision</button>
        </div>

        <!-- Chat Title Header (Visible only during chat) -->
        <div id="chatTitleHeader" class="absolute top-6 left-1/2 transform -translate-x-1/2 z-30 pointer-events-none opacity-0 transition-opacity duration-500 flex justify-center w-full">
            <div class="flex items-center gap-2 max-w-[80%] drop-shadow-md bg-black/30 px-4 py-1.5 rounded-full backdrop-blur-sm border border-white/5">
                <i class="ph ph-chat-circle text-emerald-400"></i>
                <span id="chatTitleDisplay" class="text-white text-sm sm:text-base font-bold tracking-wide truncate">New Chat</span>
            </div>
        </div>

        <!-- Colourful Popup Hamburger Menu -->
        <nav class="circular-menu transition-opacity duration-500" id="mainCircularNav">
            <input type="checkbox" class="menu-open" name="menu-open" id="menu-open" />
            <label class="circular-menu-button" id="navMenuBtn" for="menu-open">
                <span class="hamburger-lines line-1"></span>
                <span class="hamburger-lines line-2"></span>
                <span class="hamburger-lines line-3"></span>
            </label>
            <!-- Menu Items -->
            <button type="button" onclick="startNewChat()" class="circular-menu-item item-home" title="New Chat">
                <div class="jiggle-inner"><i class="ph ph-house text-2xl"></i></div>
            </button>
            <button type="button" onclick="openHistory()" class="circular-menu-item item-history" title="Chat History">
                <div class="jiggle-inner"><i class="ph ph-clock-counter-clockwise text-2xl"></i></div>
            </button>
            <button type="button" onclick="openSettings()" class="circular-menu-item item-settings" title="Settings">
                <div class="jiggle-inner"><i class="ph ph-gear text-2xl"></i></div>
            </button>
        </nav>

        <!-- Ghost Mode / Temp Chat Button -->
        <div id="ghostIconContainer" class="fixed top-5 right-5 z-40 pointer-events-auto transition-opacity duration-500">
            <button id="tempChatBtn" onclick="startTemporaryChat()" class="w-12 h-12 rounded-full glass-panel flex items-center justify-center text-gray-400 hover:text-emerald-400 hover:bg-emerald-500/10 transition-all shadow-md" title="Temporary Chat (Ghost Mode)">
                <i class="ph ph-ghost text-2xl"></i>
            </button>
        </div>

        <!-- Animated Greeting Area with Suggestions -->
        <div id="greetingArea" class="absolute inset-0 flex flex-col items-center justify-center transition-all duration-700 ease-in-out p-6 text-center z-10 w-full overflow-hidden mt-10">
            <h1 class="text-4xl sm:text-5xl font-bold mb-3 tracking-tight leading-tight pointer-events-auto">
                <span id="timeGreeting" class="text-white cursor-pointer hover:text-emerald-300 transition-colors" onclick="changeGreeting()" title="Click for a new greeting!">Hello,</span><br/>
                <span id="userNameDisplay" class="google-name"></span>
            </h1>
            <p id="welcomeSubtitle" class="text-gray-400 text-lg mb-8 h-7 font-mono text-sm"></p>

            <!-- Suggestions UI -->
            <div class="flex flex-col items-center gap-4 w-full max-w-2xl pointer-events-auto" id="suggestionsBlock">
                <button id="suggestionsBtn" class="px-6 py-2.5 rounded-full neo-glass text-emerald-400 hover:bg-emerald-500/20 transition-colors flex items-center gap-2 border border-emerald-500/30 font-bold tracking-wide">
                    <i class="ph ph-lightbulb text-lg"></i> Try a Suggestion
                </button>

    <script>
        // --- APP MODE LOGIC (Text vs Vision) ---
        let appMode = 'text';

        function setAppMode(mode) {
            appMode = mode;
            const textBtn = document.getElementById('modeTextBtn');
            const visBtn = document.getElementById('modeVisionBtn');
            const suggestionsBlock = document.getElementById('suggestionsBlock');
            const modelSelectorContainer = document.getElementById('modelSelectorContainer');
            
            if (mode === 'text') {
                textBtn.className = "px-5 py-1.5 rounded-full text-sm font-bold transition-all bg-emerald-500/20 text-emerald-400";
                visBtn.className = "px-5 py-1.5 rounded-full text-sm font-bold transition-all text-gray-400 hover:text-white";
                messageInput.placeholder = "Message Vortex...";
                suggestionsBlock.style.display = 'flex';
                modelSelectorContainer.style.display = 'flex';
            } else {
                visBtn.className = "px-5 py-1.5 rounded-full text-sm font-bold transition-all bg-emerald-500/20 text-emerald-400";
                textBtn.className = "px-5 py-1.5 rounded-full text-sm font-bold transition-all text-gray-400 hover:text-white";
                messageInput.placeholder = "Describe an image to generate...";
                suggestionsBlock.style.display = 'none';
                modelSelectorContainer.style.display = 'none';
                slashCommandMenu.classList.add('hidden');
                slashCommandMenu.classList.remove('flex');
            }
        }

        // --- API & SYSTEM CONFIG ---
        const CLOUDFLARE_API = "https://ai-chat-backend.sawyerbobk563.workers.dev";
        
        let APP_CONFIG = {
            apiKey: localStorage.getItem('aiApiKey') || "groqurl",
            model: localStorage.getItem('aiModel') || "llama-3.1-8b-instant",
            maxTokens: parseInt(localStorage.getItem('aiTokens')) || 4096,
            temperature: parseFloat(localStorage.getItem('aiTemp')) || 0.7,
            reasoningEffort: localStorage.getItem('aiReason') || "medium",
            
            // User & Data
            preferredName: localStorage.getItem('prefName') || "",
            aboutMe: localStorage.getItem('aboutMe') || "",
            emailHistory: localStorage.getItem('emailHistory') || "",
            reminders: localStorage.getItem('aiReminders') || "",

            // EmailJS Config
            emailjsServiceId: localStorage.getItem('emailjsServiceId') || "service_17usvk3",
            emailjsTemplateId: localStorage.getItem('emailjsTemplateId') || "template_27rg9cj",
            emailjsPublicKey: localStorage.getItem('emailjsPublicKey') || "H1Q7r_KdpW6yYyqn3"
        };
        
        // Init EmailJS
        if (APP_CONFIG.emailjsPublicKey) {
            emailjs.init(APP_CONFIG.emailjsPublicKey);
        }

        // Setup marked.js options for code highlighting & tables
        marked.setOptions({
            highlight: function(code, lang) {
                const language = hljs.getLanguage(lang) ? lang : 'plaintext';
                return hljs.highlight(code, { language }).value;
            },
            breaks: true
        });

        // State Variables
        let conversationHistory = [];
        let hasSentMessage = false;
        let isTemporaryChat = false;
        let sessions = []; // Cloud sessions
        let currentSessionId = null;
        let authUsername = null;
        let stopTypingAnimation = false;
        let pendingAttachments = []; 
        const messageRawContent = {}; 

        // Apply System Prompt Based on Settings
        function getSystemPrompt() {
            let prompt = `You are Vortex, an advanced, highly intelligent AI assistant. You have built-in capabilities to process context and answer user queries concisely and accurately. Please apply a ${APP_CONFIG.reasoningEffort.toUpperCase()} level of reasoning and thought effort to your responses. You can use markdown to generate detailed tables and structured layouts when presenting data.`;
            if (APP_CONFIG.preferredName) prompt += `\n\nThe user's preferred name is: ${APP_CONFIG.preferredName}.`;
            if (APP_CONFIG.aboutMe) prompt += `\n\nHere is information the user has provided about themselves:\n${APP_CONFIG.aboutMe}`;
            if (APP_CONFIG.emailHistory) prompt += `\n\nHere is a log of emails the user has recently sent using the /sendemail command:\n${APP_CONFIG.emailHistory}`;
            
            prompt += `\n\nHere are the user's current Reminders and Notes:\n${APP_CONFIG.reminders || "(No reminders currently set)"}\n\nYou can help the user manage these reminders. If the user asks you to add a reminder/task, include the exact string <ADD_REMINDER>task</ADD_REMINDER> somewhere in your response. To remove one, include <REMOVE_REMINDER>task</REMOVE_REMINDER>. The system will automatically parse these tags and update the user's notes, so you don't need to explain how the tags work.`;

            prompt += `\n\nTo ask the user a structured multiple-choice question, use this EXACT format anywhere in your response:\n<VORTEX_FORM title="Question Title" options="Option 1, Option 2, Option 3" />\nThe system will render this as an interactive UI card.`;

            // Special instruction for deep model web source listing
            if (APP_CONFIG.model === 'groq/compound') {
                prompt += `\n\nIf you utilize your web search capabilities to pull current information, you MUST list your sources at the very end of your response.`;
            }
            
            return prompt;
        }

        // UI Elements
        const authScreen = document.getElementById('authScreen');
        const authForm = document.getElementById('authForm');
        const mainApp = document.getElementById('mainApp');
        const greetingArea = document.getElementById('greetingArea');
        const userNameDisplay = document.getElementById('userNameDisplay');
        const chatContainer = document.getElementById('chatContainer');
        const chatForm = document.getElementById('chatForm');
        const messageInput = document.getElementById('messageInput');
        const sendBtn = document.getElementById('sendBtn');
        const historyList = document.getElementById('historyList');
        const navMenuBtn = document.getElementById('navMenuBtn');
        const inputBorderWrap = document.getElementById('inputBorderWrap');
        const attachmentTray = document.getElementById('attachmentTray');
        const scrollToBottomBtn = document.getElementById('scrollToBottomBtn');
        const slashCommandMenu = document.getElementById('slashCommandMenu');
        const ghostIconContainer = document.getElementById('ghostIconContainer');
        const modeSwitcher = document.getElementById('modeSwitcher');

        // Scroll-to-Bottom Logic
        chatContainer.addEventListener('scroll', () => {
            const distFromBottom = chatContainer.scrollHeight - chatContainer.scrollTop - chatContainer.clientHeight;
            if (distFromBottom > 150) {
                scrollToBottomBtn.classList.remove('opacity-0', 'pointer-events-none', 'translate-y-4');
            } else {
                scrollToBottomBtn.classList.add('opacity-0', 'pointer-events-none', 'translate-y-4');
            }
        });

        scrollToBottomBtn.addEventListener('click', () => {
            chatContainer.scrollTo({ top: chatContainer.scrollHeight, behavior: 'smooth' });
        });

        // Slash Command Menu Listener with Dynamic Filtering
        messageInput.addEventListener('input', () => {
            const val = messageInput.value;
            
            if (appMode === 'vision') return; // No slash commands in vision mode

            if (val.startsWith('/')) {
                slashCommandMenu.classList.remove('hidden');

            const errorDiv = document.getElementById('authError');

            if (!usernameInput || !passwordInput) return;

            errorDiv.classList.add('hidden');

            try {
                const res = await fetch(`${CLOUDFLARE_API}${endpoint}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username: usernameInput, password: passwordInput })
                });
                
                const data = await res.json();
                if (!res.ok) throw new Error(data.error || "An error occurred");

                if (isLoginMode) {
                    const storageObj = rememberMe ? localStorage : sessionStorage;
                    storageObj.setItem('authToken', data.token);
                    storageObj.setItem('authUsername', data.username);
                    authUsername = data.username;
                    
                    await fetchChatsFromCloud(data.token);
                    
                    authScreen.classList.add('opacity-0');

        function updateAssistantMessage(id, content) {
            messageRawContent[id] = content;
            
            // 1. Mask the reminder tags for the UI so they render nicely instead of breaking markdown
            let displayContent = content
                .replace(/<ADD_REMINDER>([\s\S]*?)<\/ADD_REMINDER>/gi, '\n\n*⏳ Adding reminder: "')
                .replace(/<\/ADD_REMINDER>/gi, '"*\n\n')
                .replace(/<REMOVE_REMINDER>([\s\S]*?)<\/REMOVE_REMINDER>/gi, '\n\n*⏳ Removing reminder: "')
                .replace(/<\/REMOVE_REMINDER>/gi, '"*\n\n');

            // 2. Parse Custom UI Question Popups (Claude-style)
            // Expected format: <VORTEX_FORM title="Question Title" options="Option 1, Option 2, Option 3" />
            displayContent = displayContent.replace(/<VORTEX_FORM\s+title="([^"]+)"\s+options="([^"]+)"\s*\/>/gi, (match, title, optionsStr) => {
                const options = optionsStr.split(',').map(o => o.trim());
                let buttonsHtml = options.map(opt => `<button onclick="useSuggestion('${opt.replace(/'/g, "\\'")}')" class="px-4 py-2 bg-emerald-500/20 hover:bg-emerald-500/30 border border-emerald-500/40 rounded-lg text-sm text-emerald-100 font-medium transition-colors">${escapeHTML(opt)}</button>`).join('');
                
                return `\n\n<div class="my-4 p-4 neo-glass rounded-xl flex flex-col gap-3 w-full sm:max-w-sm border-emerald-500/40 shadow-lg">
                    <h4 class="font-bold text-white text-sm">${escapeHTML(title)}</h4>
                    <div class="flex flex-col gap-2">${buttonsHtml}</div>
                </div>\n\n`;
            });

            const msgElement = document.getElementById(id);
            if (msgElement) {
                msgElement.innerHTML = marked.parse(displayContent);
            }
        }

        async function generateTitle(promptStr, sessionId) {

            try {

                    method: 'POST',
                    headers: { 'Authorization': `Bearer ${APP_CONFIG.apiKey}`, 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        model: "llama-3.1-8b-instant",
                        messages: [{role: "user", content: `Generate a 1 to 2 word maximum title for this prompt. No quotes, no punctuation: ${promptStr}`}],
                        max_tokens: 10,
                        temperature: 0.3
                    })
                });
                const data = await res.json();
                const title = data.choices[0].message.content.trim().replace(/["']/g, '');
                const session = sessions.find(s => s.id === sessionId);
                if(session) {
                    session.title = title || "Chat";
                    document.getElementById('chatTitleDisplay').textContent = session.title;
                    renderHistoryList();
                    saveSessionToCloud(sessionId); 
                }
            } catch(e) {}
        }

        async function triggerAIResponse(payload, placeholderId) {
            let assistantFullResponse = "";
            let activeModelId = APP_CONFIG.model;
            const uiModelSelection = inlineModelSelect.value;
            if (uiModelSelection === 'fast') activeModelId = 'llama-3.1-8b-instant';
            else if (uiModelSelection === 'thinking') activeModelId = 'llama-3.3-70b-versatile';
            else if (uiModelSelection === 'deep') activeModelId = 'groq/compound';

            try {
                const response = await fetch('https://api.groq.com/openai/v1/chat/completions', {
                    method: 'POST',
                    headers: { 'Authorization': `Bearer ${APP_CONFIG.apiKey}`, 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        model: activeModelId,
                        messages: conversationHistory,
                        temperature: APP_CONFIG.temperature,
                        max_tokens: APP_CONFIG.maxTokens,
                        stream: true
                    })
                });

                if (!response.ok) {
                    if (response.status === 429) throw new Error("RATE_LIMIT");
                    const errData = await response.json();
                    throw new Error(errData.error?.message || `API Error: ${response.status}`);
                }

                const reader = response.body.getReader();
                const decoder = new TextDecoder("utf-8");
                let buffer = '';

                while (true) {
                    const { done, value } = await reader.read();
                    if (done) break;

                    buffer += decoder.decode(value, { stream: true });
                    const lines = buffer.split('\n');
                    buffer = lines.pop(); 

                    for (const line of lines) {
                        if (line.trim() === '') continue;
                        if (line.startsWith('data: ')) {
                            const dataStr = line.substring(6);
                            if (dataStr === '[DONE]') break;
                            try {
                                const data = JSON.parse(dataStr);
                                const delta = data.choices[0]?.delta?.content || '';
                                if (delta) {
                                    assistantFullResponse += delta;
                                    updateAssistantMessage(placeholderId, assistantFullResponse);
                                }
                            } catch (e) { }
                        }
                    }
                }

                // AI REMINDERS SYSTEM (PROCESS AFTER STREAM)
                let addedReminders = [];
                let removedReminders = [];

                assistantFullResponse = assistantFullResponse.replace(/<ADD_REMINDER>([\s\S]*?)<\/ADD_REMINDER>/gi, (match, p1) => {
                    addedReminders.push(p1.trim());
                    return `\n\n*✅ Added to reminders: "${p1.trim()}"*\n\n`;
                });

                assistantFullResponse = assistantFullResponse.replace(/<REMOVE_REMINDER>([\s\S]*?)<\/REMOVE_REMINDER>/gi, (match, p1) => {
                    removedReminders.push(p1.trim());
                    return `\n\n*🗑️ Removed from reminders: "${p1.trim()}"*\n\n`;
                });

                if (addedReminders.length > 0 || removedReminders.length > 0) {
                    let currentReminders = APP_CONFIG.reminders.split('\n').filter(r => r.trim());
                    
                    addedReminders.forEach(r => currentReminders.push("- " + r));
                    removedReminders.forEach(r => {
                        currentReminders = currentReminders.filter(existing => !existing.toLowerCase().includes(r.toLowerCase()));
                    });

                    APP_CONFIG.reminders = currentReminders.join('\n');
                    localStorage.setItem('aiReminders', APP_CONFIG.reminders);
                    document.getElementById('set-reminders').value = APP_CONFIG.reminders;
                    
                    // Final UI render with nice italics replacing the ugly tags
                    updateAssistantMessage(placeholderId, assistantFullResponse);
                }
                
                conversationHistory.push({ role: "assistant", content: assistantFullResponse });

                if (!isTemporaryChat) {
                    const session = sessions.find(s => s.id === currentSessionId);
                    if (session) {
                        session.history = [...conversationHistory];
                        session.updated_at = Date.now();
                        saveSessionToCloud(currentSessionId);
                    }
                }
                
                const placeholderEl = document.getElementById(placeholderId);
                placeholderEl.classList.remove('streaming'); 
                document.getElementById(`actions-${placeholderId}`).classList.remove('opacity-0', 'pointer-events-none');

            } catch (error) {
                let friendlyError = error.message;
                if (error.message === "RATE_LIMIT" || error.message.includes("429")) {
                    friendlyError = "You have reached your API rate limit. Please wait a moment before trying again.";
                } else if (error.message.includes("401")) {
                    friendlyError = "Authentication failed. Please check if your Groq API Key is valid in settings.";
                } else if (error.message.includes("Failed to fetch")) {
                    friendlyError = "Network error. Please check your internet connection.";
                }

                document.getElementById(placeholderId).classList.remove('streaming');
                document.getElementById(placeholderId).innerHTML = `
                    <div class="neo-glass border border-red-500/50 bg-red-500/10 p-4 rounded-2xl flex items-start gap-3 mt-2 max-w-lg">
                        <i class="ph ph-warning-circle text-red-400 text-xl mt-0.5 shrink-0"></i>
                        <div>
                            <h4 class="text-red-400 font-semibold text-sm">Connection Error</h4>
                            <p class="text-gray-300 text-xs mt-1 leading-relaxed">${escapeHTML(friendlyError)}</p>
                        </div>
                    </div>
                `;
                conversationHistory.pop(); 
            }
        }

        // --- Slide-up Menus & Swipe-to-Close Setup ---
        const historyModal = document.getElementById('historyModal');

        function setupSwipeToClose(modalEl, contentId, closeFunc) {
            const content = document.getElementById(contentId);
            const swipeArea = content.querySelector('.swipe-area');
            let startY = 0, currentY = 0, isDragging = false;

            swipeArea.addEventListener('touchstart', (e) => {
                startY = e.touches[0].clientY;
                isDragging = true;
                content.style.transition = 'none';
            }, { passive: true });

            swipeArea.addEventListener('touchmove', (e) => {
                if (!isDragging) return;
                currentY = e.touches[0].clientY;
                const dy = currentY - startY;
                if (dy > 0) content.style.transform = `translateY(${dy}px)`;
            }, { passive: true });

            swipeArea.addEventListener('touchend', (e) => {
                if (!isDragging) return;
                isDragging = false;
                content.style.transition = 'transform 0.3s ease-out';
                const dy = currentY - startY;
                if (dy > 100) {
                    closeFunc();
                    setTimeout(() => { content.style.transform = ''; }, 300);
                } else {
                    content.style.transform = 'translateY(0)';
                }
            });
        }

        setupSwipeToClose(historyModal, 'historyContent', closeHistory);
        setupSwipeToClose(settingsModal, 'settingsContent', closeSettings);

        function formatHistoryDate(timestamp) {
            if(!timestamp) return "";
            const d = new Date(timestamp);
            const today = new Date();
            const isToday = d.getDate() === today.getDate() && d.getMonth() === today.getMonth() && d.getFullYear() === today.getFullYear();
            if (isToday) return "Today";
            
            const yesterday = new Date(today);
            yesterday.setDate(yesterday.getDate() - 1);
            const isYesterday = d.getDate() === yesterday.getDate() && d.getMonth() === yesterday.getMonth() && d.getFullYear() === yesterday.getFullYear();
            if (isYesterday) return "Yesterday";

            return d.toLocaleDateString([], { month: 'short', day: 'numeric' });
        }

                document.getElementById('set-emailhistory').value = APP_CONFIG.emailHistory;
                document.getElementById('set-reminders').value = APP_CONFIG.reminders;

                document.getElementById('set-key').value = APP_CONFIG.apiKey;
                setModel.value = APP_CONFIG.model;
                document.getElementById('set-tokens').value = APP_CONFIG.maxTokens;
                document.getElementById('set-temp').value = APP_CONFIG.temperature;
                
                document.getElementById('set-email-service').value = APP_CONFIG.emailjsServiceId;
                document.getElementById('set-email-template').value = APP_CONFIG.emailjsTemplateId;
                document.getElementById('set-email-public').value = APP_CONFIG.emailjsPublicKey;
                
                const rMap = { "low": 0, "medium": 1, "high": 2 };
                document.getElementById('set-reason').value = rMap[APP_CONFIG.reasoningEffort] !== undefined ? rMap[APP_CONFIG.reasoningEffort] : 1;
                
                document.getElementById('tokensDisplay').textContent = APP_CONFIG.maxTokens;
                document.getElementById('tempDisplay').textContent = APP_CONFIG.temperature;
                const rText = ['Low', 'Medium', 'High'];
                document.getElementById('reasonDisplay').textContent = rText[document.getElementById('set-reason').value];
            }

            settingsModal.classList.remove('hidden');
            settingsModal.classList.add('flex');
            setTimeout(() => {
                settingsModal.classList.remove('opacity-0');
                document.getElementById('settingsContent').classList.remove('translate-y-full');
                document.getElementById('settingsContent').classList.add('translate-y-0');
            }, 10);
        }

        function closeSettings() {
            settingsModal.classList.add('opacity-0');
            document.getElementById('settingsContent').classList.remove('translate-y-0');
            document.getElementById('settingsContent').classList.add('translate-y-full');
            setTimeout(() => {
                settingsModal.classList.add('hidden');
                settingsModal.classList.remove('flex');
            }, 300);
        }

        function clearEmailHistory() {
            if(confirm("Clear your email history record?")) {
                APP_CONFIG.emailHistory = "";
                localStorage.setItem('emailHistory', "");
                document.getElementById('set-emailhistory').value = "";
            }
        }
        
        function clearReminders() {
            if(confirm("Clear your current reminders and tasks?")) {
                APP_CONFIG.reminders = "";
                localStorage.setItem('aiReminders', "");
                document.getElementById('set-reminders').value = "";
            }
        }

        // --- History Logic Continued ---

        function startNewChat() {
            chatContainer.innerHTML = '';
            conversationHistory = [{ role: "system", content: getSystemPrompt() }];
            hasSentMessage = false;
            currentSessionId = null;
            isTemporaryChat = false;
            pendingAttachments = [];
            renderAttachments();
            
            changeGreeting();
            document.getElementById('welcomeSubtitle').innerHTML = "";
            wIdx = 0;
            stopTypingAnimation = false;
            if(appMode === 'text') setTimeout(typeWelcomeSubtitle, 100); 

            // Restore normal model selector options
            const modelSelect = document.getElementById('inlineModelSelect');
            if (modelSelect) {
                modelSelect.options[0].text = "⚡ Fast";
                modelSelect.options[1].text = "🧠 Think";
                modelSelect.options[2].text = "🔍 Deep";
            }
            updateSuggestionsForMode(false);
            
            // Turn off ghost button active style
            const tempBtn = document.getElementById('tempChatBtn');
            tempBtn.classList.remove('bg-red-500/20', 'text-red-400', 'border', 'border-red-500/50');
            tempBtn.classList.add('text-gray-400', 'glass-panel');

            inputBorderWrap.classList.remove('border-static');
            navMenuBtn.classList.remove('glass-gray-nav');
            document.getElementById('chatTitleHeader').classList.add('opacity-0');
            
            modeSwitcher.classList.remove('opacity-0', 'pointer-events-none');
            ghostIconContainer.classList.remove('opacity-0', 'pointer-events-none');

            greetingArea.classList.remove('hidden', 'fade-out');
            chatContainer.classList.add('hidden');
            closeHistory();
            messageInput.focus();
        }

        let openMenuId = null;

        function renderHistoryList() {
            historyList.innerHTML = '';
            // Sort sessions by updated_at descending
            sessions.sort((a,b) => (b.updated_at || 0) - (a.updated_at || 0));

            sessions.forEach(session => {
                const itemDiv = document.createElement('div');
                itemDiv.className = "group w-full flex items-center justify-between px-4 py-3 rounded-xl bg-white/5 hover:bg-white/10 transition-colors text-sm text-gray-200 border border-white/5 relative";
                
                const dateStr = formatHistoryDate(session.updated_at);

                itemDiv.innerHTML = `
                    <div class="flex items-center truncate flex-1 cursor-pointer" onclick="loadSession('${session.id}')">
                        <i class="ph ph-chat-circle mr-3 text-emerald-500/70 text-lg"></i>
                        <span class="truncate pr-2">${escapeHTML(session.title)}</span>
                    </div>
                    <div class="flex items-center gap-3 relative">
                        <span class="text-[10px] text-gray-500">${dateStr}</span>
                        <button onclick="event.stopPropagation(); toggleSessionMenu('${session.id}', event);" class="p-1.5 text-gray-400 hover:text-white rounded-md hover:bg-white/10 transition-colors" title="Options">
                            <i class="ph ph-dots-three-vertical text-lg"></i>
                        </button>
                        <div id="menu-${session.id}" class="hidden absolute right-0 bottom-full mb-1 w-32 bg-[#1a1a24] border border-white/10 rounded-xl shadow-xl z-50 overflow-hidden">
                            <button onclick="event.stopPropagation(); renameSession('${session.id}');" class="w-full text-left px-4 py-2.5 hover:bg-white/5 transition-colors flex items-center gap-2 text-sm">
                                <i class="ph ph-pencil text-gray-400"></i> Rename
                            </button>
                            <button onclick="event.stopPropagation(); deleteSession('${session.id}');" class="w-full text-left px-4 py-2.5 hover:bg-red-500/10 text-red-400 transition-colors flex items-center gap-2 text-sm">
                                <i class="ph ph-trash"></i> Delete
                            </button>
                        </div>
                    </div>
                `;
                historyList.appendChild(itemDiv);
            });
        }

        function toggleSessionMenu(id, e) {
            e.stopPropagation();
            if(openMenuId && openMenuId !== id) {
                const oldMenu = document.getElementById(`menu-${openMenuId}`);
                if(oldMenu) oldMenu.classList.add('hidden');
            }
            const menu = document.getElementById(`menu-${id}`);
            if(menu) {
                menu.classList.toggle('hidden');
                openMenuId = menu.classList.contains('hidden') ? null : id;
            }
        }

        function loadSession(id) {
            const session = sessions.find(s => s.id === id);
            if (!session) return;
            
            setAppMode('text'); // Ensure standard UI applies
            
            currentSessionId = id;
            conversationHistory = [...session.history];
            hasSentMessage = true;
            isTemporaryChat = false;
            
            stopTypingAnimation = true;
            inputBorderWrap.classList.add('border-static');
            navMenuBtn.classList.add('glass-gray-nav');
            
            modeSwitcher.classList.add('opacity-0', 'pointer-events-none');
            ghostIconContainer.classList.add('opacity-0', 'pointer-events-none');

            document.getElementById('chatTitleDisplay').textContent = session.title;
            document.getElementById('chatTitleDisplay').classList.remove('text-red-400');
            document.querySelector('#chatTitleHeader i').className = "ph ph-chat-circle text-emerald-400";
            document.getElementById('chatTitleHeader').classList.remove('opacity-0');

            greetingArea.classList.add('hidden');
            chatContainer.classList.remove('hidden');
            chatContainer.innerHTML = '';
            
            conversationHistory.forEach(msg => {
                if (msg.role === 'user') {
                    let visibleText = msg.content.split('[Attached Document:')[0].trim();
                    if(visibleText.startsWith('/sendemail') || visibleText.startsWith('/weather') || visibleText.startsWith('/ip') || visibleText.startsWith('/genjutsu') || visibleText.startsWith('/upload') || visibleText.startsWith('/itunes')) {
                        renderUserMessage(visibleText);
                    } else {
                        renderUserMessage(visibleText || "(Attached Document)");
                    }
                } else if (msg.role === 'assistant') {
                    const placeholderId = createAssistantMessagePlaceholder();
                    document.getElementById(placeholderId).classList.remove('streaming');
                    updateAssistantMessage(placeholderId, msg.content);
                    document.getElementById(`actions-${placeholderId}`).classList.remove('opacity-0', 'pointer-events-none');
                }
            });
            
            closeHistory();
            setTimeout(() => { chatContainer.scrollTo({ top: chatContainer.scrollHeight, behavior: 'auto' }); }, 50);
        }

        function renameSession(id) {
            document.getElementById(`menu-${id}`).classList.add('hidden');
            openMenuId = null;
            
            const session = sessions.find(s => s.id === id);
            if (!session) return;
            const newName = prompt("Enter new name for this chat:", session.title);
            if (newName && newName.trim()) {
                session.title = newName.trim();
                session.updated_at = Date.now();
                if (currentSessionId === id) {
                    document.getElementById('chatTitleDisplay').textContent = session.title;
                }
                renderHistoryList();
                saveSessionToCloud(id); 
            }
        }

        function deleteSession(id) {
            document.getElementById(`menu-${id}`).classList.add('hidden');
            openMenuId = null;
            
            if(confirm("Are you sure you want to delete this chat?")) {
                sessions = sessions.filter(s => s.id !== id);
                renderHistoryList();
                deleteSessionFromCloud(id); 
                if (currentSessionId === id) startNewChat(); 
            }
        }

        function copyMessage(id) {
            const text = messageRawContent[id];
            if (text) {
                // Strip the formatting tags for clipboard copying
                const cleanText = text
                    .replace(/<ADD_REMINDER>([\s\S]*?)<\/ADD_REMINDER>/gi, '')
                    .replace(/<REMOVE_REMINDER>([\s\S]*?)<\/REMOVE_REMINDER>/gi, '')
                    .replace(/<VORTEX_FORM[\s\S]*?\/>/gi, '[Interactive Form Removed]')
                    .replace(/\n\n\*✅ Added to reminders.*?\*\n\n/gi, '')
                    .replace(/\n\n\*🗑️ Removed from reminders.*?\*\n\n/gi, '')
                    .replace(/\n\n\*⏳ Adding reminder.*?\*\n\n/gi, '')
                    .replace(/\n\n\*⏳ Removing reminder.*?\*\n\n/gi, '')
                    .trim();

                navigator.clipboard.writeText(cleanText);
                const icon = document.getElementById(`copy-icon-${id}`);
                icon.className = "ph ph-check text-green-400 text-sm";
                setTimeout(() => icon.className = "ph ph-copy text-sm", 2000);
            }
        }

        function resendMessage() {
            const lastUserMsgIndex = conversationHistory.findLastIndex(m => m.role === 'user');
            if (lastUserMsgIndex !== -1) {
                const prompt = conversationHistory[lastUserMsgIndex].content;
                conversationHistory.splice(lastUserMsgIndex);
                messageInput.value = prompt.split('[Attached Document:')[0].trim();
                chatForm.dispatchEvent(new Event('submit', { cancelable: true }));
            }
        }

        // Settings Logic Continued
        function saveSettings() {
            const setModel = document.getElementById('set-model');
            if (!setModel) return;

            const newName = document.getElementById('set-username').value.trim();
            const newAbout = document.getElementById('set-aboutme').value.trim();
            const newEmailHist = document.getElementById('set-emailhistory').value.trim();
            const newReminders = document.getElementById('set-reminders').value.trim();

            const newKey = document.getElementById('set-key').value.trim();
            const newModel = setModel.value;
            const newTokens = parseInt(document.getElementById('set-tokens').value);
            const newTemp = parseFloat(document.getElementById('set-temp').value);
            
            const emailService = document.getElementById('set-email-service').value.trim();
            const emailTemplate = document.getElementById('set-email-template').value.trim();
            const emailPublic = document.getElementById('set-email-public').value.trim();
            
            const rVals = ['low', 'medium', 'high'];
            const newReason = rVals[document.getElementById('set-reason').value];

            APP_CONFIG.preferredName = newName; localStorage.setItem('prefName', newName);
            APP_CONFIG.aboutMe = newAbout; localStorage.setItem('aboutMe', newAbout);
            APP_CONFIG.emailHistory = newEmailHist; localStorage.setItem('emailHistory', newEmailHist);
            APP_CONFIG.reminders = newReminders; localStorage.setItem('aiReminders', newReminders);

            if (newKey) { APP_CONFIG.apiKey = newKey; localStorage.setItem('aiApiKey', newKey); }
            if (newModel) { APP_CONFIG.model = newModel; localStorage.setItem('aiModel', newModel); }
            if (newTokens) { APP_CONFIG.maxTokens = newTokens; localStorage.setItem('aiTokens', newTokens); }
            
            APP_CONFIG.temperature = newTemp; localStorage.setItem('aiTemp', newTemp);
            APP_CONFIG.reasoningEffort = newReason; localStorage.setItem('aiReason', newReason);
            
            APP_CONFIG.emailjsServiceId = emailService; localStorage.setItem('emailjsServiceId', emailService);
            APP_CONFIG.emailjsTemplateId = emailTemplate; localStorage.setItem('emailjsTemplateId', emailTemplate);
            APP_CONFIG.emailjsPublicKey = emailPublic; localStorage.setItem('emailjsPublicKey', emailPublic);

            if(APP_CONFIG.emailjsPublicKey) emailjs.init(APP_CONFIG.emailjsPublicKey);

            // Update visible name if needed
            if (!hasSentMessage) userNameDisplay.textContent = APP_CONFIG.preferredName || authUsername;

            closeSettings();
        }

        // Placeholder Typing Animation
        const examplePrompts = [
            "Message Vortex...",
            "Find a song: /itunes blinding lights",
            "Upload a file to cloud: /upload",
            "Search for anime: /genjutsu naruto",
            "Check the weather: /weather London",
            "Send an email: /sendemail",
            "What are my current reminders?"
        ];
        let promptIndex = 0;
        let charIndex = 0;
        let isDeleting = false;
        
        function typePlaceholder() {
            if (stopTypingAnimation || isTemporaryChat || appMode === 'vision') {
                if(appMode !== 'vision') messageInput.placeholder = "Message Vortex...";
                return;
            }

            const currentPrompt = examplePrompts[promptIndex];
            
            if (isDeleting) {
                messageInput.placeholder = currentPrompt.substring(0, charIndex - 1);
                charIndex--;
            } else {
                messageInput.placeholder = currentPrompt.substring(0, charIndex + 1);
                charIndex++;
            }

            let typeSpeed = isDeleting ? 30 : 80;

            if (!isDeleting && charIndex === currentPrompt.length) {
                typeSpeed = 2500;
                isDeleting = true;
            } else if (isDeleting && charIndex === 0) {
                isDeleting = false;
                promptIndex = (promptIndex + 1) % examplePrompts.length;
                typeSpeed = 500;
            }

            setTimeout(typePlaceholder, typeSpeed);
        }

        typePlaceholder();

    </script>
</body>
</html>
